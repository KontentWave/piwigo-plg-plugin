<p>
  <h4>这个插件适合谁使用？</h4>
  Profile Liveness Guard 适用于图库管理员，用来定期确认某个资料所有者仍然控制着与根相册关联的已验证手机号码。
</p>

<p>
  <h4>它监控什么</h4>
  <ul class="square-list">
    <li>针对非管理员相册所有者的周期性存活校验</li>
    <li>手动或定时发送短信挑战</li>
    <li>跟踪未确认挑战的宽限期</li>
    <li>到期后自动将相册树设为私有</li>
    <li>由管理员恢复可见性并查看审计记录</li>
  </ul>
</p>

<p>
  <h4>运行说明</h4>
  LanguageSwitch 可以把 PLG 切换到任何已安装的 Piwigo 语言。该插件现在提供英式英语、西班牙语、匈牙利语、斯洛伐克语、俄语、乌克兰语和简体中文的专用翻译。
</p>
